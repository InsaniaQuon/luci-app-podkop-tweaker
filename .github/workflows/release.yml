name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 liblua5.1-dev luarocks
          lua5.1 -v

      - name: Install busted
        run: |
          luarocks install --local busted
          echo "$HOME/.luarocks/bin" >> $GITHUB_PATH

      - name: Run tests
        run: busted -o utfTerminal tests/

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build archive
        run: |
          tar -czf luci-app-podkop-tweaker-${{ github.ref_name }}.tar.gz \
            usr/lib/lua/luci/controller/podkop-tweaker.lua \
            usr/lib/lua/luci/view/podkop-tweaker/ \
            usr/lib/lua/pt-subs-lib.lua \
            usr/lib/lua/pt-auto-update.lua \
            usr/share/luci/menu.d/luci-app-podkop-tweaker.json \
            usr/share/rpcd/acl.d/luci-app-podkop-tweaker.json \
            etc/config/podkop-fragment \
            etc/init.d/podkop-fragment \
            usr/bin/podkop-fragment-patch.sh

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: luci-app-podkop-tweaker-*.tar.gz

      - name: Keep only last 2 releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list -L 50 --json tagName --jq '.[].tagName' | tail -n +3 | while read tag; do
            echo "Deleting old release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
