name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install busted
        run: luarocks install busted

      - name: Run tests
        run: busted -o utfTerminal tests/

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build archive
        run: |
          tar -czf luci-app-podkop-tweaker-${{ github.ref_name }}.tar.gz \
            usr/lib/lua/luci/controller/podkop-tweaker.lua \
            usr/lib/lua/luci/view/podkop-tweaker/ \
            usr/lib/lua/pt-subs-lib.lua \
            usr/lib/lua/pt-auto-update.lua \
            usr/share/luci/menu.d/luci-app-podkop-tweaker.json \
            usr/share/rpcd/acl.d/luci-app-podkop-tweaker.json

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: luci-app-podkop-tweaker-*.tar.gz
